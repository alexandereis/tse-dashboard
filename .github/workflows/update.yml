name: Atualizar nomeações (coletor do DOU)

# Quando este robô roda:
on:
  schedule:
    # Horários em UTC. O Brasil (BRT) é UTC-3.
    # 11:00 UTC = 08:00 em Brasília  |  21:00 UTC = 18:00 em Brasília
    - cron: "0 11 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

# Permite que o robô grave (commit) o JSON atualizado de volta no repositório.
permissions:
  contents: write

concurrency:
  group: coletor-dou
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r collector/requirements.txt

      - name: Rodar o coletor
        run: python collector/collect.py

      - name: Commitar os dados se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/nomeacoes.json; then
            echo "Sem novidades no DOU. Nada a commitar."
          else
            git add data/nomeacoes.json
            git commit -m "chore: atualiza nomeações ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Dados atualizados e enviados!"
          fi
