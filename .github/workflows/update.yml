name: Atualizar nomeações (coletor do DOU)

# Quando este robô roda:
on:
  schedule:
    # Horários em UTC — o Brasil (BRT) é UTC-3, então some 3h para achar a hora local.
    # O coletor só salva/atualiza o site quando encontra algo NOVO (veja o passo de commit).
    - cron: "0 5 * * *"    # 02:00 em Brasília
    - cron: "0 6 * * *"    # 03:00 em Brasília
    - cron: "0 13 * * *"   # 10:00 em Brasília
    - cron: "0 16 * * *"   # 13:00 em Brasília
    - cron: "0 21 * * *"   # 18:00 em Brasília
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

# Permite que o robô grave (commit) o JSON atualizado de volta no repositório.
permissions:
  contents: write

concurrency:
  group: coletor-dou
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r collector/requirements.txt

      - name: Rodar o coletor
        run: python collector/collect.py

      - name: Commitar os dados se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/nomeacoes.json; then
            echo "Sem novidades no DOU. Nada a commitar."
          else
            git add data/nomeacoes.json
            git commit -m "chore: atualiza nomeações ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Dados atualizados e enviados!"
          fi
